services:
  db:
    image: mariadb:11
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: drupal
      MARIADB_USER: drupal
      MARIADB_PASSWORD: drupal
    volumes:
      - drupal-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "localhost", "-udrupal", "-pdrupal"]
      interval: 10s
      timeout: 5s
      retries: 5

  drupal:
    image: drupal:11-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      # Pre-set DB credentials so the installer can skip the DB config screen
      DRUPAL_DB_HOST: db
      DRUPAL_DB_PORT: 3306
      DRUPAL_DB_NAME: drupal
      DRUPAL_DB_USER: drupal
      DRUPAL_DB_PASSWORD: drupal
    volumes:
      - drupal-files:/var/www/html/sites/default/files
      - drupal-config:/var/www/html/sites/default
      - drupal-modules:/var/www/html/modules/contrib
      - drupal-themes:/var/www/html/themes/contrib

volumes:
  drupal-db:
  drupal-files:
  drupal-config:
  drupal-modules:
  drupal-themes:
